# ─── Symbol Configuration ─────────────────────────────────────────────────────────
# Per-symbol trading settings.
#
# Symbol naming:
#   BTCUSDT.P  → Bybit linear perpetual (FUTURES) — matches TradingView .P naming
#   BTCUSDT    → Bybit spot (SPOT)
#
# market_type : auto-detected from .P suffix (FUTURES for .P, SPOT otherwise)
#               You can override this explicitly if needed.
# leverage    : Default leverage (FUTURES only). Overridable per-account via
#               ACCOUNT_N_BTCUSDT.P_LEVERAGE env var.
# order_type  : Default order type — Market (default) or Limit.
#               Can be overridden per-alert from TradingView ("order_type" field).
#
symbols:
  # ── Perpetual FUTURES (linear) ── auto-detected as FUTURES from .P suffix ──────
  BTCUSDT.P:
    leverage: 10
    order_type: Market

  ETHUSDT.P:
    leverage: 10
    order_type: Market

  SOLUSDT.P:
    leverage: 10
    order_type: Market

  XRPUSDT.P:
    leverage: 10
    order_type: Market

  BNBUSDT.P:
    leverage: 10
    order_type: Market

  # ── SPOT examples ── auto-detected as SPOT (no .P suffix) ──────────────────────
  # BTCUSDT:
  #   leverage: 1   # ignored for SPOT, but kept for consistency
  #   order_type: Market
